<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}نظام الهيئة{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    {% if show_nav %}
    <nav class="navbar navbar-expand-lg navbar-dark navbar-syria">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">نظام إدارة البيانات الذكية</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">لوحة التحكم</a></li>
                    <li class="nav-item"><a class="nav-link" href="/exporters">المصدرين</a></li>
                    <li class="nav-item"><a class="nav-link" href="/products">المنتجات</a></li>
                    <li class="nav-item"><a class="nav-link" href="/markets">الأسواق</a></li>
                    <li class="nav-item"><a class="nav-link" href="/licenses">التراخيص</a></li>
                    <li class="nav-item"><a class="nav-link" href="/finance">المالية</a></li>
                    <li class="nav-item"><a class="nav-link" href="/documents">المستندات</a></li>
                    <li class="nav-item"><a class="nav-link" href="/reports">التقارير</a></li>
                </ul>
                <form class="d-flex" action="/auth/logout" method="post">
                    <button class="btn btn-outline-light btn-sm" type="submit">تسجيل خروج</button>
                </form>
            </div>
        </div>
    </nav>
    {% endif %}
    <main class="container mt-4">
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
